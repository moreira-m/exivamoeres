# Nenhum segredo aqui: tudo sensível vem de variável de ambiente.
spring:
  application:
    name: exivamoeres

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/exivamoeres}
    username: ${POSTGRES_USER:exivamoeres}
    password: ${POSTGRES_PASSWORD}

  jpa:
    # O schema é do Flyway; o Hibernate só valida que entidade e banco batem.
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    locations: classpath:db/migration

  security:
    oauth2:
      client:
        registration:
          # Os defaults "placeholder" existem só pra aplicação subir em dev
          # sem credenciais OAuth — o login social falha apenas se for usado.
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder-secret}
            scope: [openid, profile, email]
          discord:
            client-id: ${DISCORD_CLIENT_ID:placeholder-client-id}
            client-secret: ${DISCORD_CLIENT_SECRET:placeholder-secret}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/discord"
            scope: [identify, email]
        provider:
          # Discord não é um provider conhecido do Spring, então os endpoints
          # são declarados manualmente.
          discord:
            authorization-uri: https://discord.com/oauth2/authorize
            token-uri: https://discord.com/api/oauth2/token
            user-info-uri: https://discord.com/api/users/@me
            user-name-attribute: id

server:
  port: 8080

# ----- Configurações próprias da aplicação -----
app:
  jwt:
    # HMAC-SHA, mínimo de 64 bytes. Gere com: openssl rand -base64 64
    secret: ${JWT_SECRET}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:30}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:14}
  cors:
    # Nunca "*": só a origem real do frontend.
    allowed-origin: ${FRONTEND_URL:http://localhost:5173}
  oauth2:
    # Após login social o backend redireciona pra cá com o token no fragmento.
    redirect-url: ${OAUTH2_REDIRECT_URL:http://localhost:5173/oauth/callback}
  tibiadata:
    base-url: ${TIBIADATA_BASE_URL:https://api.tibiadata.com}
  claim:
    # Intervalo do polling de verificação (regra de negócio: 15 minutos)
    poll-interval: ${CLAIM_POLL_INTERVAL:15m}
    # Claim não verificado em 24h expira
    expiration-hours: 24
  cache:
    # TTL da checagem de elegibilidade (world + Free/Premium) por personagem.
    character-eligibility-ttl: ${CHARACTER_ELIGIBILITY_CACHE_TTL:1h}
    worlds-ttl: ${WORLDS_CACHE_TTL:24h}
  team:
    max-members: 5
  chat:
    # Rate limit de mensagens por usuário (mensagens por minuto).
    messages-per-minute: ${CHAT_MESSAGES_PER_MINUTE:20}

resilience4j:
  retry:
    instances:
      tibiadata:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
  circuitbreaker:
    instances:
      tibiadata:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.exivamoeres: INFO
